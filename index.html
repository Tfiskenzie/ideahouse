<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ideas House — Experiential Agency</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* =========================
ROOT SYSTEM (NEW PALETTE)
========================= */
:root{
  --bg:#ffffff;
  --text:#111111;
  --muted:#6b6b6b;
  --soft:#f5f5f5;
  --border:rgba(0,0,0,0.08);

  --accent:#FF4D00;
  --accent2:#ff7a3d;

  --gradient: radial-gradient(circle at 20% 10%, rgba(255,77,0,0.10), transparent 40%),
              radial-gradient(circle at 80% 30%, rgba(0,0,0,0.04), transparent 50%);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* =========================
GLOBAL TYPOGRAPHY
========================= */
h1,h2,h3{
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:0.02em;
  line-height:0.95;
}

p{
  line-height:1.7;
  color:var(--muted);
}

/* =========================
LOADER
========================= */
#loader{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity .8s ease, visibility .8s ease;
}

#loader.hide{
  opacity:0;
  visibility:hidden;
}

.loader-inner{
  text-align:center;
}

.loader-logo{
  font-family:'Bebas Neue';
  font-size:3.5rem;
}

.loader-logo span{
  color:var(--accent);
}

.loader-bar{
  width:220px;
  height:2px;
  background:#eee;
  margin:20px auto;
  overflow:hidden;
}

.loader-bar span{
  display:block;
  height:100%;
  width:0%;
  background:var(--accent);
  animation:load 2s ease forwards;
}

@keyframes load{
  to{width:100%}
}

/* =========================
NAV
========================= */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:1000;
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.6rem;
}

.logo span{color:var(--accent)}

nav ul{
  display:flex;
  gap:25px;
  list-style:none;
}

nav a{
  text-decoration:none;
  color:var(--muted);
  font-size:0.85rem;
}

nav a:hover{color:var(--accent)}

/* =========================
HERO (NOW WHITE THEME)
========================= */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:140px 6% 80px;
  background:
    var(--gradient),
    linear-gradient(#fff,#fff);
  position:relative;
}

.hero-text{
  flex:1;
}

.hero-text h1{
  font-size:clamp(3.5rem,6vw,7rem);
  color:var(--text);
}

.hero-text h1 span{
  color:var(--accent);
}

.hero-text p{
  max-width:450px;
  margin-top:20px;
}

.hero-card{
  flex:1;
  display:flex;
  justify-content:center;
}

.hero-box{
  width:320px;
  height:420px;
  border-radius:20px;
  background:
    linear-gradient(135deg, rgba(255,77,0,0.1), rgba(0,0,0,0.03));
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
}

/* =========================
BRANDS
========================= */
.brands{
  padding:60px 6%;
  text-align:center;
}

.brand-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:25px;
  margin-top:40px;
}

.brand{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--soft);
  transition:.3s;
}

.brand:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

/* SVG LOGO STYLE */
.brand svg{
  width:80px;
  height:30px;
  opacity:0.7;
}

/* =========================
SECTIONS
========================= */
.section{
  padding:100px 6%;
}

.section h2{
  font-size:clamp(2.5rem,5vw,4rem);
  margin-bottom:20px;
}

.section-tag{
  font-size:0.75rem;
  letter-spacing:0.2em;
  color:var(--accent);
  margin-bottom:10px;
}

/* =========================
WORK GRID
========================= */
.work{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.work-card{
  height:320px;
  border-radius:16px;
  background:var(--soft);
  position:relative;
  overflow:hidden;
  transition:.3s;
}

.work-card:hover{
  transform:translateY(-6px);
}

.work-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* =========================
RESPONSIVE
========================= */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
    gap:40px;
  }

  nav ul{display:none}

  .brand-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .work{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-inner">
    <div class="loader-logo">IDEAS<span>.</span>HOUSE</div>
    <div class="loader-bar"><span></span></div>
    <p>Building Culture</p>
  </div>
</div>

<!-- NAV -->
<nav>
  <div class="logo">IDEAS<span>.</span>HOUSE</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Work</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>WE BUILD <span>CULTURE</span><br/>NOT CAMPAIGNS</h1>
    <p>We design experiential marketing systems that turn brands into cultural movements across Africa.</p>
  </div>

  <div class="hero-card">
    <div class="hero-box"></div>
  </div>
</section>

<!-- BRANDS -->
<section class="brands">
  <div class="section-tag">Brands We've Worked With</div>

  <div class="brand-grid">

    <!-- SVG LOGOS -->
    <div class="brand">
      <svg viewBox="0 0 100 30"><text x="0" y="20" font-size="18">MTN</text></svg>
    </div>

    <div class="brand">
      <svg viewBox="0 0 100 30"><text x="0" y="20" font-size="18">CocaCola</text></svg>
    </div>

    <div class="brand">
      <svg viewBox="0 0 100 30"><text x="0" y="20" font-size="18">Nestlé</text></svg>
    </div>

    <div class="brand">
      <svg viewBox="0 0 100 30"><text x="0" y="20" font-size="18">Guinness</text></svg>
    </div>

    <div class="brand">
      <svg viewBox="0 0 100 30"><text x="0" y="20" font-size="18">Airtel</text></svg>
    </div>

  </div>
</section>

<!-- WORK -->
<section class="section">
  <div class="section-tag">Featured Work</div>
  <h2>CAMPAIGNS THAT MOVE PEOPLE</h2>

  <div class="work">
    <div class="work-card">
      <div class="work-overlay"></div>
    </div>
    <div class="work-card">
      <div class="work-overlay"></div>
    </div>
  </div>
</section>

<script>
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").classList.add("hide");
  },1800);
});
</script>

</body>
</html>
